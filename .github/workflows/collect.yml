name: Collect Claude Code News

on:
  schedule:
    # 毎日 JST 7:00 / 13:00 / 21:00 (UTC 22:00 / 4:00 / 12:00)
    - cron: '0 22 * * *'
    - cron: '0 4 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run collector
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: npm run collect

      - name: Check for new content
        id: check
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push new content
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "ccnews-bot"
          git config user.email "bot@ccnews.dev"
          git add src/content/news/ scripts/.seen.json
          git commit -m "chore: add new Claude Code news $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
